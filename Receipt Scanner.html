<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 2rem 1rem; color: #1a1a1a; }
    .app { max-width: 600px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 26px; font-weight: 600; }
    .header p { font-size: 14px; color: #666; margin-top: 4px; }
    .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
    .upload-zone { border: 2px dashed #ccc; border-radius: 12px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.15s; background: #fff; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    .upload-zone:hover { background: #f9f9f9; }
    .upload-zone.has-image { border-style: solid; border-color: #1e7e34; background: #e6f4ea; }


    .upload-zone img { display: none; }
    .upload-zone.has-image .upload-prompt { display: none; }
    .upload-zone .success-msg { display: none; flex-direction: column; align-items: center; gap: 6px; }
    .upload-zone.has-image .success-msg { display: flex; }
    .success-icon { font-size: 28px; }
    .success-text { font-size: 13px; font-weight: 500; color: #1e7e34; }
    .success-sub { font-size: 11px; color: #2d9e4a; }
    .upload-icon { font-size: 28px; margin-bottom: 6px; }
    .upload-label { font-size: 13px; font-weight: 500; }
    .upload-sub { font-size: 11px; color: #888; margin-top: 3px; }
    .photo-label { font-size: 12px; color: #666; margin-bottom: 6px; font-weight: 500; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 20px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.12s; background: #fff; color: #1a1a1a; width: 100%; }
    .btn:hover { background: #f5f5f5; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #1a1a1a; color: #fff; border-color: transparent; }
    .btn-primary:hover { background: #333; }
    .status { font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-top: 1rem; display: none; }
    .status.info { background: #e8f0fe; color: #1a56db; display: block; }
    .status.success { background: #e6f4ea; color: #1e7e34; display: block; }
    .status.error { background: #fce8e6; color: #c5221f; display: block; }
    .results-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1.5rem; margin-top: 1.5rem; display: none; }
    .results-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .field { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; gap: 12px; }
    .field:last-child { border-bottom: none; }
    .field-label { font-size: 13px; color: #666; min-width: 100px; }
    .field-value input { font-size: 13px; font-weight: 500; text-align: right; border: 1px solid #ddd; border-radius: 6px; padding: 5px 8px; background: #fafafa; color: #1a1a1a; min-width: 180px; }
    .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 1.25rem; }
    .setup-section { background: #fff; border-radius: 14px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
    .setup-section h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .setup-field { margin-bottom: 12px; }
    .setup-field label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
    .setup-field input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fafafa; }
    .setup-field input:focus { outline: none; border-color: #999; }
    .toggle-setup { font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; display: block; text-align: center; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📄 Receipt scanner</h1>
    <p>Upload up to 2 photos of a receipt and save to Google Sheets</p>
  </div>

  <div class="setup-section" id="setupSection" style="display:none;">
    <h2>Settings</h2>
    <div class="setup-field">
      <label>Anthropic API Key</label>
      <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
    </div>
    <div class="setup-field">
      <label>Google Client ID</label>
      <input type="text" id="googleClientId" placeholder="xxxx.apps.googleusercontent.com" />
    </div>
    <div class="setup-field">
      <label>Google Sheet ID</label>
      <input type="text" id="sheetId" placeholder="Sheet ID from the URL" />
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">Save settings</button>
  </div>
  <span class="toggle-setup" onclick="toggleSetup()">⚙️ Settings</span>

  <div style="height: 1.5rem;"></div>

  <div class="upload-row">
    <div>
      <div class="photo-label">Photo 1 (required)</div>
      <div class="upload-zone" id="uploadZone1" onclick="document.getElementById('fileInput1').click()">
        <div class="upload-prompt">
          <div class="upload-icon">📷</div>
          <div class="upload-label">Click to upload</div>
          <div class="upload-sub">JPG, PNG, HEIC</div>
        </div>
        <img id="previewImg1" alt="" />
        <div class="success-msg"><div class="success-icon">✅</div><div class="success-text">Photo uploaded</div><div class="success-sub">Click to change</div></div>
      </div>
    </div>
    <div>
      <div class="photo-label">Photo 2 (optional)</div>
      <div class="upload-zone" id="uploadZone2" onclick="document.getElementById('fileInput2').click()">
        <div class="upload-prompt">
          <div class="upload-icon">📷</div>
          <div class="upload-label">Click to upload</div>
          <div class="upload-sub">For long receipts</div>
        </div>
        <img id="previewImg2" alt="" />
        <div class="success-msg"><div class="success-icon">✅</div><div class="success-text">Photo uploaded</div><div class="success-sub">Click to change</div></div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput1" accept="image/*" style="display:none;" onchange="handleFile(event,1)" />
  <input type="file" id="fileInput2" accept="image/*" style="display:none;" onchange="handleFile(event,2)" />

  <div class="actions">
    <button class="btn btn-primary" id="scanBtn" onclick="scanReceipt()" disabled>Scan receipt</button>
  </div>

  <div class="status" id="status"></div>

  <div class="results-card" id="resultsCard">
    <h2>Extracted details</h2>
    <div id="fieldsContainer"></div>
    <div class="actions" style="margin-top:1.25rem;">
      <button class="btn btn-primary" onclick="saveToSheets()">Save to Google Sheets</button>
      <button class="btn" onclick="resetApp()">Scan another receipt</button>
    </div>
  </div>
</div>

<script>
const FIELDS = [
  { key: 'store_name', label: 'Store' },
  { key: 'date', label: 'Date' },
  { key: 'category', label: 'Category' },
  { key: 'total', label: 'Total ($)' },
  { key: 'items', label: 'Items' },
];

let images = [null, null];
let mimeTypes = ['image/jpeg', 'image/jpeg'];
let accessToken = null;

function getSettings() {
  return {
    anthropicKey: localStorage.getItem('anthropicKey') || '',
    googleClientId: localStorage.getItem('googleClientId') || '908806406436-mu9loij0v1d8e4rav7m45jp2gft782nu.apps.googleusercontent.com',
    sheetId: localStorage.getItem('sheetId') || '1Af0whZ7pxgLh75y9NRN4amXLIzHEorILykqx_dCnmGk',
  };
}

function saveSettings() {
  localStorage.setItem('anthropicKey', document.getElementById('anthropicKey').value.trim());
  localStorage.setItem('googleClientId', document.getElementById('googleClientId').value.trim());
  localStorage.setItem('sheetId', document.getElementById('sheetId').value.trim());
  toggleSetup();
  setStatus('Settings saved!', 'success');
}

function toggleSetup() {
  const s = document.getElementById('setupSection');
  const visible = s.style.display !== 'none';
  if (!visible) {
    const cfg = getSettings();
    document.getElementById('anthropicKey').value = cfg.anthropicKey;
    document.getElementById('googleClientId').value = cfg.googleClientId;
    document.getElementById('sheetId').value = cfg.sheetId;
  }
  s.style.display = visible ? 'none' : 'block';
}

function handleFile(e, num) {
  const file = e.target.files[0];
  if (!file) return;
  const idx = num - 1;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const maxDim = 2000;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let quality = 0.85;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      while (dataUrl.length * 0.75 > 4.5 * 1024 * 1024 && quality > 0.4) {
        quality -= 0.1;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      images[idx] = dataUrl.split(',')[1];
      mimeTypes[idx] = 'image/jpeg';
      document.getElementById('uploadZone' + num).classList.add('has-image');
      document.getElementById('scanBtn').disabled = false;
      setStatus('', '');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

async function scanReceipt() {
  if (!images[0]) return;
  const cfg = getSettings();
  if (!cfg.anthropicKey) { setStatus('Please add your Anthropic API key in Settings first.', 'error'); return; }
  document.getElementById('scanBtn').disabled = true;
  setStatus('Reading receipt with AI...', 'info');
  document.getElementById('resultsCard').style.display = 'none';

  try {
    const content = [];
    content.push({ type: 'image', source: { type: 'base64', media_type: mimeTypes[0], data: images[0] } });
    if (images[1]) content.push({ type: 'image', source: { type: 'base64', media_type: mimeTypes[1], data: images[1] } });
    content.push({ type: 'text', text: 'Extract receipt data from the image(s) and respond ONLY with a JSON object, no markdown, no explanation. Fields: store_name, date (YYYY-MM-DD), total (number only), category (choose based on what was actually purchased, not the store name - pick the best fit from: Groceries, Restaurant, Gas, Electronics, Clothing, Meals & Entertainment, Supplies, or Other), items (comma-separated list of main items, max 5). Use empty string for missing fields.' });

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': cfg.anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content }] })
    });
    const data = await resp.json();
    if (!data.content) throw new Error(data.error?.message || JSON.stringify(data));
    const text = data.content.map(b => b.text || '').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    showResults(parsed);
    setStatus('Receipt scanned! Review the details below, then save.', 'success');
  } catch(err) {
    setStatus('Error: ' + (err.message || 'Could not read the receipt.'), 'error');
    document.getElementById('scanBtn').disabled = false;
  }
}

function showResults(data) {
  const container = document.getElementById('fieldsContainer');
  container.innerHTML = '';
  FIELDS.forEach(f => {
    const row = document.createElement('div');
    row.className = 'field';
    row.innerHTML = `<span class="field-label">${f.label}</span><span class="field-value"><input id="field_${f.key}" value="${data[f.key] || ''}" /></span>`;
    container.appendChild(row);
  });
  document.getElementById('resultsCard').style.display = 'block';
}

function getEditedData() {
  const out = {};
  FIELDS.forEach(f => { out[f.key] = document.getElementById('field_' + f.key)?.value || ''; });
  return out;
}

async function saveToSheets() {
  const cfg = getSettings();
  const btn = event.target;
  btn.disabled = true;
  setStatus('Connecting to Google...', 'info');
  if (!accessToken) {
    try { accessToken = await getGoogleToken(cfg.googleClientId); }
    catch(e) { setStatus('Google sign-in failed or was cancelled.', 'error'); btn.disabled = false; return; }
  }
  const d = getEditedData();
  const row = [d.date, d.store_name, d.category, d.total, d.items, new Date().toLocaleString()];
  setStatus('Saving to Google Sheets...', 'info');
  try {
    await ensureHeader(accessToken, cfg.sheetId);
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/Sheet1!A:F:append?valueInputOption=USER_ENTERED`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [row] })
    });
    if (!res.ok) throw new Error(await res.text());
    setStatus('Saved to Google Sheets successfully!', 'success');
    btn.disabled = false;
  } catch(e) {
    setStatus('Failed to save. Try signing in again.', 'error');
    accessToken = null;
    btn.disabled = false;
  }
}

async function ensureHeader(token, sheetId) {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Sheet1!A1:F1`, { headers: { 'Authorization': 'Bearer ' + token } });
  const data = await res.json();
  if (!data.values || data.values[0]?.[0] !== 'Date') {
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Sheet1!A1:F1?valueInputOption=USER_ENTERED`, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [['Date','Store','Category','Total','Items','Scanned At']] })
    });
  }
}

function getGoogleToken(clientId) {
  return new Promise((resolve, reject) => {
    const redirectUri = window.location.origin + window.location.pathname.replace(/\/$/, '') + '/';
    const params = new URLSearchParams({ client_id: clientId, redirect_uri: redirectUri, response_type: 'token', scope: 'https://www.googleapis.com/auth/spreadsheets', prompt: 'consent' });
    const popup = window.open('https://accounts.google.com/o/oauth2/v2/auth?' + params, 'google_auth', 'width=500,height=600');
    const timer = setInterval(() => {
      try {
        if (popup.closed) { clearInterval(timer); reject(new Error('closed')); return; }
        const url = popup.location.href;
        if (url.includes('access_token')) {
          clearInterval(timer); popup.close();
          resolve(new URLSearchParams(url.split('#')[1]).get('access_token'));
        }
      } catch(e) {}
    }, 300);
  });
}

function resetApp() {
  images = [null, null];
  [1,2].forEach(n => {
    document.getElementById('previewImg' + n).src = '';
    document.getElementById('uploadZone' + n).classList.remove('has-image');
    document.getElementById('fileInput' + n).value = '';
  });
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('resultsCard').style.display = 'none';
  setStatus('', '');
}
</script>
</body>
</html>
